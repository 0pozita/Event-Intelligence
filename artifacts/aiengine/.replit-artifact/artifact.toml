kind = "web"
previewPath = "/"
title = "AIEngine"
version = "1.0.0"
id = "artifacts/aiengine"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22228

[services.development]
run = "pnpm --filter @workspace/aiengine run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aiengine", "run", "build" ]
publicDir = "artifacts/aiengine/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22228"
BASE_PATH = "/"
